# jwt configuration
jwt:
  signing-key: pddzl
  expires-time: 86400
  buffer-time: 43200
  issuer: pddzl
  multi-login: true       # 是否允许多设备同时登录：true-允许，false-只允许单设备
  multi-login-limit: 5    # 多设备登录数量限制：0-无限制，>0-限制数量

# casbin RBAC configuration
casbin:
  cache-ttl: 3600              # 策略缓存TTL（秒）
  auto-load-interval: 600000       # 自动加载策略间隔（秒）
  enable-role-hierarchy: true  # 启用角色继承
  enable-data-permission: true # 启用数据权限

# zap logger configuration
zap:
  level: debug
  format: text
  prefix: '[TD27] '
  encode-level: 'LowercaseLevelEncoder'
  director: log
  show-line: true
  stacktrace-key: stacktrace
  log-in-console: true

# 日志割接
rotateLogs:
  max-size: 5
  max-backups: 7
  max-age: 7
  compress: false

# system configuration
system:
  env: 'dev' # prod 生产环境、dev 开发环境
  host: '0.0.0.0'
  port: 8888
  router-prefix: "" # global router prefix
  disable-auto-migrate: true # permit auto migrate table
  stack: true

file:
  upload: './resource/upload' # 本地上传目录

# pgsql configuration
pgsql:
  host: 'pgsql'
  port: '5432'
  config: 'sslmode=disable TimeZone=Asia/Shanghai'
  db-name: 'td27'
  username: 'postgres'
  password: 'td27admin'
  max-idle-conns: 10
  max-open-conns: 100
  log-mode: false
  log-zap: true

# captcha configuration
captcha:
  key-long: 6
  img-width: 240
  img-height: 80

# 跨域配置
# 需要配合 server/initialize/router.go#L32 使用
cors:
  mode: whitelist # 放行模式: allow-all, 放行全部; whitelist, 白名单模式, 来自白名单内域名的请求添加 cors 头; strict-whitelist 严格白名单模式, 白名单外的请求一律拒绝
  whitelist:
    - allow-origin: example1.com
      allow-headers: content-type
      allow-methods: GET, POST
      expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type
      allow-credentials: true # 布尔值
    - allow-origin: example2.com
      allow-headers: content-type
      allow-methods: GET, POST
      expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type
      allow-credentials: true # 布尔值
