version: "3"
services:
  pgsql:
    container_name: td27_pgsql
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: td27admin
      POSTGRES_DB: td27
    volumes:
      - ./pgsql/data:/var/lib/postgresql/data
      - ./pgsql/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - td27-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d td27"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    sysctls:
      net.ipv4.ping_group_range: 0   2147483647
    container_name: td27_server
    build: 
      context: ../server/
      dockerfile: ./Dockerfile
    image: td27_server:2.0
    depends_on:
      pgsql:
        condition: service_healthy
    links:
      - pgsql
    restart: on-failure
    networks:
      - td27-network
    environment:
      - TD27_CONFIG=/app/configs/config.pgsql.yaml

  web:
    container_name: td27_web
    build: 
      context: ../web/
      dockerfile: ./Dockerfile
    image: td27_web:2.0
    environment:
      - BACKEND=server
    command: /bin/sh -c "envsubst '$$BACKEND' < /etc/nginx/conf.d/default.template > /etc/nginx/conf.d/default.conf && sleep 2 && exec nginx -g 'daemon off;'"
    ports:
      - 8500:8500
    depends_on:
      - server
    restart: on-failure
    networks:
      - td27-network

networks:
  td27-network:
    driver: bridge
