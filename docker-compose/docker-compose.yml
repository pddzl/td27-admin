version: "3"
services:
  mysql:
    container_name: td27_mysql
    image: mysql:8.0.28
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql/data/:/var/lib/mysql
      - ./mysql/init/:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: td27admin
      MYSQL_DATABASE: td27
    networks:
      - td27-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    sysctls:
      net.ipv4.ping_group_range: 0   2147483647
    container_name: td27_server
    build: 
      context: ../server/
      dockerfile: ./Dockerfile
    image: td27_server:2.0
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql
    restart: on-failure
    networks:
      - td27-network

  web:
    container_name: td27_web
    build: 
      context: ../web/
      dockerfile: ./Dockerfile
    image: td27_web:2.0
    environment:
      - BACKEND=server
    command: /bin/sh -c "envsubst '$$BACKEND' < /etc/nginx/conf.d/default.template > /etc/nginx/conf.d/default.conf && sleep 2 && exec nginx -g 'daemon off;'"
    ports:
      - 8500:8500
    depends_on:
      - server
    restart: on-failure
    networks:
      - td27-network

networks:
  td27-network:
    driver: bridge
